name: Build How Did It Go

on:
  push:
    branches: [main]
    paths:
      - 'how-did-it-go/src/**'
      - 'how-did-it-go/App.jsx'
      - 'how-did-it-go/index.html'
      - 'how-did-it-go/package.json'
      - 'how-did-it-go/vite.config.js'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: how-did-it-go
        run: npm ci

      - name: Build
        working-directory: how-did-it-go
        run: npm run build

      - name: Copy dist to served directory
        run: cp -r how-did-it-go/dist/* how-did-it-go/

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add how-did-it-go/index.html how-did-it-go/assets/
          git diff --cached --quiet || git commit -m "build: update how-did-it-go production files"
          git push
