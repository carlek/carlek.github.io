name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: how-did-it-go
        run: npm ci

      - name: Build React app
        working-directory: how-did-it-go
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy everything except node_modules, src, and build artifacts
          rsync -a --exclude='how-did-it-go/node_modules' \
                   --exclude='how-did-it-go/src' \
                   --exclude='how-did-it-go/dist' \
                   --exclude='how-did-it-go/App.jsx' \
                   --exclude='_site' \
                   ./ _site/
          # Replace how-did-it-go with the built output
          rm -rf _site/how-did-it-go
          cp -r how-did-it-go/dist _site/how-did-it-go

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
